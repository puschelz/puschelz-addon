name: Auto Tag Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  CURSEFORGE_API_KEY: ${{ secrets.CURSEFORGE_API_KEY }}

jobs:
  tag-main:
    if: ${{ !contains(github.event.head_commit.message, '[no release]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: auto-tag-main
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Skip if HEAD already tagged
        id: existing_tag
        run: |
          if git tag --points-at "$GITHUB_SHA" 'v*' | grep -q .; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute next tag
        if: steps.existing_tag.outputs.already_tagged != 'true'
        id: next_tag
        run: |
          latest_tag="$(git tag --list 'v*' --sort=-version:refname | head -n 1)"
          if [ -z "$latest_tag" ]; then
            next_tag="v0.1.0"
          else
            version="${latest_tag#v}"
            major="${version%%.*}"
            remainder="${version#*.}"
            minor="${remainder%%.*}"
            patch="${remainder##*.}"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi
          echo "value=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.existing_tag.outputs.already_tagged != 'true'
        env:
          NEXT_TAG: ${{ steps.next_tag.outputs.value }}
        run: |
          test -n "$NEXT_TAG"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$NEXT_TAG" "$GITHUB_SHA"
          git push origin "$NEXT_TAG"

      - name: Sync TOC version from tag
        if: steps.existing_tag.outputs.already_tagged != 'true'
        env:
          NEXT_TAG: ${{ steps.next_tag.outputs.value }}
        run: |
          TAG_VERSION="${NEXT_TAG#v}"
          test -n "$TAG_VERSION"
          sed -i -E "s/^## Version: .*/## Version: ${TAG_VERSION}/" Puschelz/Puschelz.toc
          grep -E "^## Version: ${TAG_VERSION}$" Puschelz/Puschelz.toc

      - name: Build addon zip
        if: steps.existing_tag.outputs.already_tagged != 'true'
        env:
          NEXT_TAG: ${{ steps.next_tag.outputs.value }}
        run: |
          test -d Puschelz
          test -d PuschelzBridge
          zip -r "Puschelz-${NEXT_TAG}.zip" Puschelz PuschelzBridge

      - name: Publish GitHub release + asset
        if: steps.existing_tag.outputs.already_tagged != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next_tag.outputs.value }}
          files: Puschelz-${{ steps.next_tag.outputs.value }}.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          append_body: true
          body: |
            Automated bundled release asset for WoWUp. This zip contains both `Puschelz/` and `PuschelzBridge/` and should be installed as one addon package.

      - name: Upload bundled zip to CurseForge
        if: ${{ steps.existing_tag.outputs.already_tagged != 'true' && env.CURSEFORGE_API_KEY != '' }}
        env:
          CURSEFORGE_TAG_NAME: ${{ steps.next_tag.outputs.value }}
        run: bash scripts/upload-curseforge.sh
